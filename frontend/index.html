<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Storage DApp</title>
  </head>

  <body>
    <main>
      <h1>Storage DApp</h1>
      <p>Sepolia에 배포한 Storage 컨트랙트를 호출합니다.</p>

      <button id="connectButton">MetaMask 연결</button>

      <section>
        <p>지갑 주소: <span id="walletAddress">연결되지 않음</span></p>
        <p>네트워크: <span id="network">-</span></p>
      </section>

      <hr />

      <section>
        <button id="readButton">저장된 값 조회</button>
        <p>현재 값: <strong id="storedValue">-</strong></p>
      </section>

      <section>
        <input
          id="valueInput"
          type="number"
          min="0"
          placeholder="저장할 숫자"
        />
        <button id="saveButton">값 저장</button>
      </section>

      <p id="status"></p>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
